repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # server_packages.sii fixtures are real game files; their CRLF must be
      # preserved byte-for-byte for the surgical-write tests, so keep the
      # line-ending / whitespace hooks off them.
      - id: trailing-whitespace
        exclude: ^tests/fixtures/server_packages/
      - id: end-of-file-fixer
        exclude: ^tests/fixtures/server_packages/
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2048"]  # Screenshots und Grid-Bilder koennen gross sein
        exclude: NotoColorEmoji\.ttf$
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: ^tests/fixtures/server_packages/

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies: ["types-requests"]
        args: [--ignore-missing-imports]
        exclude: ^tests/
